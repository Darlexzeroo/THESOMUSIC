services:
  - type: web
    name: waveroom
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false

      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        value: https://thesomusic.onrender.com/auth/discord/callback
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
